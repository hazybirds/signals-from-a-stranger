<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planet Code Communicator</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
    }

    .radio {
      width: 320px;
      padding: 28px;
      border-radius: 28px;
      background: #2f3542;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    .antenna {
      width: 8px;
      height: 80px;
      background: #cbd5e1;
      margin: -90px auto 10px;
      border-radius: 10px;
      transform: rotate(-15deg);
    }

    .screen {
      background: #0f172a;
      border: 3px solid #94a3b8;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ef4444;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    }

    .dot.green {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #e5e7eb;
      color: #111827;
      font-size: 14px;
    }

    .message {
      min-height: 48px;
      font-size: 16px;
      line-height: 1.4;
      color: #fde68a;
    }

    .title {
      font-size: 20px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    .stars {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.2;
  animation: twinkle 2.8s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% {
    opacity: 0.15;
    transform: scale(0.8);
  }
  50% {
    opacity: 1;
    transform: scale(1.8);
  }
}

.radio {
  position: relative;
  z-index: 1;
}
  </style>
</head>
<body>
  <div class="stars">
  <span class="star" style="top: 8%; left: 12%; animation-delay: 0s;"></span>
  <span class="star" style="top: 18%; left: 76%; animation-delay: .5s;"></span>
  <span class="star" style="top: 32%; left: 22%; animation-delay: 1.1s;"></span>
  <span class="star" style="top: 44%; left: 88%; animation-delay: .2s;"></span>
  <span class="star" style="top: 58%; left: 14%; animation-delay: 1.8s;"></span>
  <span class="star" style="top: 71%; left: 64%; animation-delay: .9s;"></span>
  <span class="star" style="top: 84%; left: 35%; animation-delay: 1.4s;"></span>
  <span class="star" style="top: 12%; left: 44%; animation-delay: 2.1s;"></span>
  <span class="star" style="top: 67%; left: 82%; animation-delay: 2.5s;"></span>
  <span class="star" style="top: 90%; left: 9%; animation-delay: .7s;"></span>
</div>
  <div class="radio">
    <div class="antenna"></div>
    <div class="title">PLANET CODE</div>

    <div class="screen">
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 1" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 2" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 3" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 4" />
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const dots = document.querySelectorAll(".dot");
    const message = document.getElementById("message");

    dots.forEach(dot => {
      dot.addEventListener("click", () => {
        dot.classList.toggle("green");
        checkMission();
      });
    });

    function checkMission() {
      const greenCount = document.querySelectorAll(".dot.green").length;

      if (greenCount >= 3) {
        message.innerHTML =
          "Mission complete!<br>Sending you back to your home planet...";
      } else {
        message.innerHTML = "";
      }
    }
  </script>
</body>
</html>
