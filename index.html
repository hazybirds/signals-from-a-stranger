<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planet Code Communicator</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
    }

    .radio {
      width: 320px;
      padding: 28px;
      border-radius: 28px;
      background: #2f3542;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    .antenna {
      width: 8px;
      height: 80px;
      background: #cbd5e1;
      margin: -90px auto 10px;
      border-radius: 10px;
      transform: rotate(-15deg);
    }

    .screen {
      background: #0f172a;
      border: 3px solid #94a3b8;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ef4444;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    }

    .dot.green {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #e5e7eb;
      color: #111827;
      font-size: 14px;
    }

    .message {
      min-height: 48px;
      font-size: 16px;
      line-height: 1.4;
      color: #fde68a;
    }

    .title {
      font-size: 20px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="radio">
    <div class="antenna"></div>
    <div class="title">PLANET CODE</div>

    <div class="screen">
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 1" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 2" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 3" />
      </div>
      <div class="row">
        <div class="dot"></div>
        <input placeholder="Word 4" />
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const dots = document.querySelectorAll(".dot");
    const message = document.getElementById("message");

    dots.forEach(dot => {
      dot.addEventListener("click", () => {
        dot.classList.toggle("green");
        checkMission();
      });
    });

    function checkMission() {
      const greenCount = document.querySelectorAll(".dot.green").length;

      if (greenCount >= 3) {
        message.innerHTML =
          "Mission complete!<br>Sending you back to your home planet...";
      } else {
        message.innerHTML = "";
      }
    }
  </script>
</body>
</html>
